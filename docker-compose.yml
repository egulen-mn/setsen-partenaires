name: partenaires

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - partenaires-web:latest
      args:
        NEXT_PUBLIC_BASE_URL: "https://partenaires.setsen.fr"
        NEXT_PUBLIC_API_URL: "https://setsen.fr"
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
        SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN:-}"
        SENTRY_ORG: "${SENTRY_ORG:-setsen-fr}"
        SENTRY_PROJECT: "${SENTRY_PROJECT:-javascript-nextjs}"
    image: partenaires-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_BASE_URL: "https://partenaires.setsen.fr"
      NEXT_PUBLIC_API_URL: "https://setsen.fr"
      BREVO_API_KEY: "${BREVO_API_KEY:-}"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
      CONTACT_TO_EMAIL: "partenaires@setsen.fr"
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
      SENTRY_ORG: "${SENTRY_ORG:-setsen-fr}"
      SENTRY_PROJECT: "${SENTRY_PROJECT:-javascript-nextjs}"
    networks:
      - proxy
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
  internal:
    driver: bridge
    internal: true
